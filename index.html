<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1c1f26">
  <title>Chromatic Pitch Pipe</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>Pitch Pipe</h1>
    <p class="subtitle">A4 = 440Hz</p>
    <select id="waveform-select" class="waveform-select" aria-label="Waveform">
      <option value="reed" selected>Reed (pitch pipe)</option>
      <option value="sine">Sine</option>
      <option value="triangle">Triangle</option>
      <option value="sawtooth">Sawtooth</option>
      <option value="square">Square</option>
    </select>
  </header>

  <main class="note-grid" id="note-grid"></main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
